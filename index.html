<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320,height=320">
<title>NZXT Z73 LM240 Display</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="screen">

    <div class="title">
        TEMPERATURE
    </div>


    <div class="gauges">


        <div class="gauge cpu">

            <div class="inside">

                <div class="label">
                    CPU
                </div>

                <div class="temp">
                    <span id="cpuTemp">--</span>
                    <small>°C</small>
                </div>

            </div>

        </div>



        <div class="gauge gpu">

            <div class="inside">

                <div class="label">
                    GPU
                </div>

                <div class="temp">
                    <span id="gpuTemp">--</span>
                    <small>°C</small>
                </div>

            </div>

        </div>


    </div>



    <div class="footer">
        KRAKEN Z73
    </div>


</div>


<script src="script.js"></script>

</body>
</html>
